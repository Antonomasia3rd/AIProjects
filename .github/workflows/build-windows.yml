name: Build Windows binaries

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      project:
        description: Project to build, or All
        required: false
        default: All
        type: choice
        options:
          - All
          - AllowContentAboveLock
          - asusblink
          - capsblink
          - YourPhoneHideBanner
          - DiscordRPC
          - NowPlayingTile
          - DesktopStub
          - CharmTray
          - SecureDesktopLauncher
          - RealTimeNotesDeskband

concurrency:
  group: windows-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect-projects:
    name: Detect changed projects
    runs-on: ubuntu-latest
    outputs:
      build_all: ${{ steps.detect.outputs.build_all }}
      skip_args: ${{ steps.detect.outputs.skip_args }}
      project_list: ${{ steps.detect.outputs.project_list }}
      release_base: ${{ steps.detect.outputs.release_base }}
      build_allow_content_above_lock: ${{ steps.detect.outputs.build_allow_content_above_lock }}
      build_asusblink: ${{ steps.detect.outputs.build_asusblink }}
      build_capsblink: ${{ steps.detect.outputs.build_capsblink }}
      build_your_phone_hide_banner: ${{ steps.detect.outputs.build_your_phone_hide_banner }}
      build_discord_rpc: ${{ steps.detect.outputs.build_discord_rpc }}
      build_now_playing_tile: ${{ steps.detect.outputs.build_now_playing_tile }}
      build_desktop_stub: ${{ steps.detect.outputs.build_desktop_stub }}
      build_charm_tray: ${{ steps.detect.outputs.build_charm_tray }}
      build_secure_desktop_launcher: ${{ steps.detect.outputs.build_secure_desktop_launcher }}
      build_real_time_notes_deskband: ${{ steps.detect.outputs.build_real_time_notes_deskband }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Validate project map
        shell: pwsh
        run: .github/scripts/Validate-ProjectMap.ps1

      - name: Validate workflow project selector
        shell: pwsh
        run: .github/scripts/Test-WorkflowProjectSelection.ps1

      - name: Scan repository policy warnings
        shell: pwsh
        run: .github/scripts/Invoke-PolicyWarnings.ps1

      - name: Scan README consistency warnings
        shell: pwsh
        run: .github/scripts/Test-ReadmeConsistency.ps1

      - name: Detect projects to build
        id: detect
        shell: pwsh
        run: |
          $projectMap = @(Get-Content -LiteralPath '.github/project-map.json' -Raw | ConvertFrom-Json)
          $eventName = '${{ github.event_name }}'
          $manualProject = '${{ github.event.inputs.project }}'
          $head = '${{ github.sha }}'
          $forceAll = $false
          $changed = @()

          if ($eventName -eq 'workflow_dispatch') {
            if ([string]::IsNullOrWhiteSpace($manualProject) -or $manualProject -eq 'All') {
              $forceAll = $true
              $selected = @($projectMap)
            } else {
              $selected = @($projectMap | Where-Object { $_.key -eq $manualProject })
              if ($selected.Count -ne 1) {
                throw "Unknown workflow_dispatch project: $manualProject"
              }
            }
          } else {
            if ($eventName -eq 'pull_request') {
              $base = '${{ github.event.pull_request.base.sha }}'
              $head = '${{ github.event.pull_request.head.sha }}'
            } else {
              $base = '${{ github.event.before }}'
              if ([string]::IsNullOrWhiteSpace($base) -or $base -match '^0+$') {
                $base = "$head^"
              }
            }

            $changed = @(git diff --name-only $base $head)
            if ($LASTEXITCODE -ne 0) {
              Write-Warning 'Could not diff changed files; falling back to a full build.'
              $forceAll = $true
              $changed = @()
            }

            if (-not $forceAll) {
              $sharedChange = [bool]($changed | Where-Object {
                $_ -like '.github/*' -or
                $_ -eq '.gitattributes' -or
                $_ -eq 'README.md'
              })
              if ($sharedChange) {
                Write-Host 'Shared workflow/repository files changed; using a full build.'
                $forceAll = $true
              }
            }

            if ($forceAll) {
              $selected = @($projectMap)
            } else {
              $selected = @($projectMap | Where-Object {
                $prefix = "$($_.folder)/"
                [bool]($changed | Where-Object { $_ -like "$prefix*" })
              })

              if ($selected.Count -eq 0) {
                Write-Host 'No project-specific changes detected; using a full build to keep CI meaningful.'
                $forceAll = $true
                $selected = @($projectMap)
              }
            }
          }

          if ($forceAll) {
            $selected = @($projectMap)
          }

          $selectedKeys = @{}
          foreach ($project in $selected) {
            $selectedKeys[$project.key] = $true
          }

          $skip = @()
          foreach ($project in $projectMap) {
            $build = $selectedKeys.ContainsKey($project.key)
            "$($project.buildOutput)=$($build.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
            if (-not $build) {
              $skip += "/skip:$($project.skipKey)"
            }
          }

          if ($forceAll) {
            $skip = @()
          }

          $projectList = ($selected | ForEach-Object { $_.label }) -join ', '
          $releaseBase = if ($selected.Count -eq 1 -and -not $forceAll) { $selected[0].key } else { 'All' }
          $releaseFamilies = ($selected | ForEach-Object { "``$($_.key)-vN``" }) -join ', '

          "build_all=$($forceAll.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "skip_args=$($skip -join ' ')" >> $env:GITHUB_OUTPUT
          "project_list=$projectList" >> $env:GITHUB_OUTPUT
          "release_base=$releaseBase" >> $env:GITHUB_OUTPUT

          "## Project selection" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "Build mode: **$(if ($forceAll) { 'full' } else { 'selected/changed projects only' })**" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "Projects: $projectList" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "Release families: $releaseFamilies" >> $env:GITHUB_STEP_SUMMARY
          if ($changed.Count -gt 0) {
            "" >> $env:GITHUB_STEP_SUMMARY
            "Changed files:" >> $env:GITHUB_STEP_SUMMARY
            foreach ($file in $changed) {
              "- ``$file``" >> $env:GITHUB_STEP_SUMMARY
            }
          }

  build-windows:
    name: Build Windows binaries
    needs: detect-projects
    runs-on: windows-2022
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Ensure MinGW-w64 for deskband build
        if: needs.detect-projects.outputs.build_all == 'true' || needs.detect-projects.outputs.build_real_time_notes_deskband == 'true'
        shell: pwsh
        run: |
          if (Get-Command g++ -ErrorAction SilentlyContinue) {
            g++ --version | Select-Object -First 1
            exit 0
          }

          choco install mingw --version=13.2.0 -y --no-progress
          $mingwBin = 'C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin'
          if (-not (Test-Path $mingwBin)) {
            $mingwBin = Get-ChildItem 'C:\ProgramData\chocolatey\lib\mingw\tools\install' -Directory -Recurse -Filter bin |
              Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $mingwBin -or -not (Test-Path $mingwBin)) {
            throw 'MinGW-w64 was installed, but g++.exe could not be located.'
          }
          $mingwBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build and package
        shell: cmd
        run: .github\scripts\build-windows.cmd ${{ needs.detect-projects.outputs.skip_args }}

      - name: Write artifact checksum summary
        shell: pwsh
        run: |
          $artifacts = @(Get-Content -LiteralPath '.github/project-map.json' -Raw | ConvertFrom-Json)
          $lines = @(
            '## Windows build outputs',
            '',
            'GitHub Actions downloads workflow artifacts as ZIP archives. The hashes below are for the payload files inside those artifacts.',
            '',
            '| Project | File | SHA256 |',
            '| --- | --- | --- |'
          )

          $count = 0
          foreach ($item in $artifacts) {
            if (-not (Test-Path -LiteralPath $item.artifactPath -PathType Leaf)) {
              continue
            }

            $hash = (Get-FileHash -LiteralPath $item.artifactPath -Algorithm SHA256).Hash.ToLowerInvariant()
            $name = Split-Path -Leaf $item.artifactPath
            $lines += "| $($item.label) | ``$name`` | ``$hash`` |"
            $count++
          }

          if ($count -eq 0) {
            throw 'No build outputs were found.'
          }

          $lines -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Run smoke tests
        shell: pwsh
        run: .github/scripts/Smoke-WindowsBuild.ps1

      - name: Upload AllowContentAboveLock artifact
        if: needs.detect-projects.outputs.build_allow_content_above_lock == 'true'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: AllowContentAboveLock
          path: AllowContentAboveLock/build/AllowContentAboveLock.exe
          if-no-files-found: error

      - name: Upload asusblink artifact
        if: needs.detect-projects.outputs.build_asusblink == 'true'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: asusblink
          path: asusblink/build/asusblink.exe
          if-no-files-found: error

      - name: Upload capsblink artifact
        if: needs.detect-projects.outputs.build_capsblink == 'true'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: capsblink
          path: capsblink/build/capsblink.exe
          if-no-files-found: error

      - name: Upload YourPhoneHideBanner artifact
        if: needs.detect-projects.outputs.build_your_phone_hide_banner == 'true'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: YourPhoneHideBanner
          path: YourPhoneHideBanner/build/YourPhoneHideBanner.exe
          if-no-files-found: error

      - name: Upload DiscordRPC artifact
        if: needs.detect-projects.outputs.build_discord_rpc == 'true'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: DiscordRPC
          path: DiscordRPC/build/DiscordRPC.exe
          if-no-files-found: error

      - name: Upload NowPlayingTile artifact
        if: needs.detect-projects.outputs.build_now_playing_tile == 'true'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: NowPlayingTile
          path: NowPlayingTile/build/NowPlayingTile-windows-x64.zip
          if-no-files-found: error

      - name: Upload DesktopStub artifact
        if: needs.detect-projects.outputs.build_desktop_stub == 'true'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: DesktopStub
          path: DesktopStub/build/DesktopStub-windows-x64.zip
          if-no-files-found: error

      - name: Upload CharmTray artifact
        if: needs.detect-projects.outputs.build_charm_tray == 'true'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: CharmTray
          path: CharmTray/build/CharmTray.exe
          if-no-files-found: error

      - name: Upload SecureDesktopLauncher artifact
        if: needs.detect-projects.outputs.build_secure_desktop_launcher == 'true'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: SecureDesktopLauncher
          path: SecureDesktopLauncher/build/SecureDesktopLauncher-windows-x64.zip
          if-no-files-found: error

      - name: Upload RealTimeNotesDeskband artifact
        if: needs.detect-projects.outputs.build_real_time_notes_deskband == 'true'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: RealTimeNotesDeskband
          path: RealTimeNotesDeskband/build/RealTimeNotesDeskband-windows-x64.zip
          if-no-files-found: error

  attest-build-provenance:
    name: Attest build provenance
    if: github.event_name != 'pull_request'
    needs: build-windows
    runs-on: windows-2022
    permissions:
      attestations: write
      contents: read
      id-token: write

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-path: artifacts/**

  auto-release:
    name: Create project releases
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - detect-projects
      - build-windows
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Download workflow artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts

      - name: Create or update automatic releases
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          PROJECT_LIST: ${{ needs.detect-projects.outputs.project_list }}
          REPO: ${{ github.repository }}
          FULL_SHA: ${{ github.sha }}
        run: .github/scripts/Publish-ProjectReleases.ps1 -ArtifactsRoot artifacts
