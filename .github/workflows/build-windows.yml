name: Build Windows binaries

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows binaries
    runs-on: windows-2022
    permissions:
      contents: read

    steps:
      - name: Check out repository
        # actions/checkout v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Ensure MinGW-w64 for deskband build
        shell: pwsh
        run: |
          if (Get-Command g++ -ErrorAction SilentlyContinue) {
            g++ --version | Select-Object -First 1
            exit 0
          }

          choco install mingw --version=13.2.0 -y --no-progress
          $mingwBin = 'C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin'
          if (-not (Test-Path $mingwBin)) {
            $mingwBin = Get-ChildItem 'C:\ProgramData\chocolatey\lib\mingw\tools\install' -Directory -Recurse -Filter bin |
              Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $mingwBin -or -not (Test-Path $mingwBin)) {
            throw 'MinGW-w64 was installed, but g++.exe could not be located.'
          }
          $mingwBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build and package
        shell: pwsh
        run: .\.github\scripts\build-windows.ps1

      - name: Upload workflow artifacts
        # actions/upload-artifact v7
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: AIProjects-Windows-${{ github.sha }}
          path: |
            AllowContentAboveLock/build/AllowContentAboveLock.exe
            AllowContentAboveLock/build/AllowContentAboveLock.exe.sha256
            asusblink/build/asusblink.exe
            asusblink/build/asusblink.exe.sha256
            capsblink/build/capsblink.exe
            capsblink/build/capsblink.exe.sha256
            YourPhoneHideBanner/build/YourPhoneHideBanner.exe
            YourPhoneHideBanner/build/YourPhoneHideBanner.exe.sha256
            DiscordRPC/build/DiscordRPC.exe
            DiscordRPC/build/DiscordRPC.exe.sha256
            NowPlayingTile/build/NowPlayingTile-windows-x64.zip
            NowPlayingTile/build/NowPlayingTile-windows-x64.zip.sha256
            DesktopStub/build/GenerateAssets.exe
            DesktopStub/build/GenerateAssets.exe.sha256
            CharmTray/build/CharmTray.exe
            CharmTray/build/CharmTray.exe.sha256
            SecureDesktopLauncher/build/SecureDesktopLauncher-windows-x64.zip
            SecureDesktopLauncher/build/SecureDesktopLauncher-windows-x64.zip.sha256
            RealTimeNotesDeskband/build/RealTimeNotesDeskband-windows-x64.zip
            RealTimeNotesDeskband/build/RealTimeNotesDeskband-windows-x64.zip.sha256
          if-no-files-found: error

  attest-build-provenance:
    name: Attest build provenance
    if: github.event_name != 'pull_request'
    needs: build-windows
    runs-on: windows-2022
    permissions:
      attestations: write
      contents: read
      id-token: write

    steps:
      - name: Download workflow artifacts
        # actions/download-artifact v7
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131
        with:
          name: AIProjects-Windows-${{ github.sha }}
          path: artifacts

      - name: Attest build provenance
        # actions/attest-build-provenance v4
        uses: actions/attest-build-provenance@b3e506e8c389afc651c5bacf2b8f2a1ea0557215
        with:
          subject-path: artifacts/**

  release-assets:
    name: Upload release assets
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
    needs: build-windows
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - name: Download workflow artifacts
        # actions/download-artifact v7
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131
        with:
          name: AIProjects-Windows-${{ github.sha }}
          path: artifacts

      - name: Upload release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          if (-not $env:RELEASE_TAG) {
            throw 'Release tag was not resolved.'
          }

          gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:RELEASE_TAG --title $env:RELEASE_TAG --notes "Automated Windows binaries built by GitHub Actions."
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

          $expected = @(
            'AllowContentAboveLock.exe',
            'AllowContentAboveLock.exe.sha256',
            'asusblink.exe',
            'asusblink.exe.sha256',
            'capsblink.exe',
            'capsblink.exe.sha256',
            'YourPhoneHideBanner.exe',
            'YourPhoneHideBanner.exe.sha256',
            'DiscordRPC.exe',
            'DiscordRPC.exe.sha256',
            'NowPlayingTile-windows-x64.zip',
            'NowPlayingTile-windows-x64.zip.sha256',
            'GenerateAssets.exe',
            'GenerateAssets.exe.sha256',
            'CharmTray.exe',
            'CharmTray.exe.sha256',
            'SecureDesktopLauncher-windows-x64.zip',
            'SecureDesktopLauncher-windows-x64.zip.sha256',
            'RealTimeNotesDeskband-windows-x64.zip',
            'RealTimeNotesDeskband-windows-x64.zip.sha256'
          )

          $files = Get-ChildItem -LiteralPath artifacts -Recurse -File
          $assets = foreach ($name in $expected) {
            $match = $files | Where-Object { $_.Name -eq $name } | Select-Object -First 1
            if (-not $match) {
              throw "Release asset missing from downloaded artifact: $name"
            }
            $match.FullName
          }

          gh release upload $env:RELEASE_TAG @assets --clobber
