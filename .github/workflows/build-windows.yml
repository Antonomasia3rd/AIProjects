name: Build Windows binaries

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows binaries
    runs-on: windows-2022
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Ensure MinGW-w64 for deskband build
        shell: pwsh
        run: |
          if (Get-Command g++ -ErrorAction SilentlyContinue) {
            g++ --version | Select-Object -First 1
            exit 0
          }

          choco install mingw --version=13.2.0 -y --no-progress
          $mingwBin = 'C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin'
          if (-not (Test-Path $mingwBin)) {
            $mingwBin = Get-ChildItem 'C:\ProgramData\chocolatey\lib\mingw\tools\install' -Directory -Recurse -Filter bin |
              Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $mingwBin -or -not (Test-Path $mingwBin)) {
            throw 'MinGW-w64 was installed, but g++.exe could not be located.'
          }
          $mingwBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build and package
        shell: cmd
        run: .github\scripts\build-windows.cmd

      - name: Write artifact checksum summary
        shell: pwsh
        run: |
          $artifacts = @(
            @{ Project = 'AllowContentAboveLock'; Path = 'AllowContentAboveLock/build/AllowContentAboveLock.exe' },
            @{ Project = 'asusblink'; Path = 'asusblink/build/asusblink.exe' },
            @{ Project = 'capsblink'; Path = 'capsblink/build/capsblink.exe' },
            @{ Project = 'YourPhoneHideBanner'; Path = 'YourPhoneHideBanner/build/YourPhoneHideBanner.exe' },
            @{ Project = 'DiscordRPC'; Path = 'DiscordRPC/build/DiscordRPC.exe' },
            @{ Project = 'NowPlayingTile'; Path = 'NowPlayingTile/build/NowPlayingTile-windows-x64.zip' },
            @{ Project = 'DesktopStub'; Path = 'DesktopStub/build/GenerateAssets.exe' },
            @{ Project = 'CharmTray'; Path = 'CharmTray/build/CharmTray.exe' },
            @{ Project = 'SecureDesktopLauncher'; Path = 'SecureDesktopLauncher/build/SecureDesktopLauncher-windows-x64.zip' },
            @{ Project = 'RealTimeNotesDeskband'; Path = 'RealTimeNotesDeskband/build/RealTimeNotesDeskband-windows-x64.zip' }
          )

          $lines = @(
            '## Windows build outputs',
            '',
            'GitHub Actions downloads workflow artifacts as ZIP archives. The hashes below are for the payload files inside those artifacts.',
            '',
            '| Project | File | SHA256 |',
            '| --- | --- | --- |'
          )

          foreach ($item in $artifacts) {
            if (-not (Test-Path -LiteralPath $item.Path -PathType Leaf)) {
              throw "Build output missing: $($item.Path)"
            }

            $hash = (Get-FileHash -LiteralPath $item.Path -Algorithm SHA256).Hash.ToLowerInvariant()
            $name = Split-Path -Leaf $item.Path
            $lines += "| $($item.Project) | ``$name`` | ``$hash`` |"
          }

          $lines -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Upload AllowContentAboveLock artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: AllowContentAboveLock
          path: AllowContentAboveLock/build/AllowContentAboveLock.exe
          if-no-files-found: error

      - name: Upload asusblink artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: asusblink
          path: asusblink/build/asusblink.exe
          if-no-files-found: error

      - name: Upload capsblink artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: capsblink
          path: capsblink/build/capsblink.exe
          if-no-files-found: error

      - name: Upload YourPhoneHideBanner artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: YourPhoneHideBanner
          path: YourPhoneHideBanner/build/YourPhoneHideBanner.exe
          if-no-files-found: error

      - name: Upload DiscordRPC artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: DiscordRPC
          path: DiscordRPC/build/DiscordRPC.exe
          if-no-files-found: error

      - name: Upload NowPlayingTile artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: NowPlayingTile
          path: NowPlayingTile/build/NowPlayingTile-windows-x64.zip
          if-no-files-found: error

      - name: Upload DesktopStub artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: DesktopStub - GenerateAssets
          path: DesktopStub/build/GenerateAssets.exe
          if-no-files-found: error

      - name: Upload CharmTray artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: CharmTray
          path: CharmTray/build/CharmTray.exe
          if-no-files-found: error

      - name: Upload SecureDesktopLauncher artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: SecureDesktopLauncher
          path: SecureDesktopLauncher/build/SecureDesktopLauncher-windows-x64.zip
          if-no-files-found: error

      - name: Upload RealTimeNotesDeskband artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: RealTimeNotesDeskband
          path: RealTimeNotesDeskband/build/RealTimeNotesDeskband-windows-x64.zip
          if-no-files-found: error

  attest-build-provenance:
    name: Attest build provenance
    if: github.event_name != 'pull_request'
    needs: build-windows
    runs-on: windows-2022
    permissions:
      attestations: write
      contents: read
      id-token: write

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-path: artifacts/**

  release-assets:
    name: Upload release assets
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
    needs: build-windows
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts

      - name: Upload release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          if (-not $env:RELEASE_TAG) {
            throw 'Release tag was not resolved.'
          }

          gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:RELEASE_TAG --title $env:RELEASE_TAG --notes "Automated Windows binaries built by GitHub Actions."
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

          $expected = @(
            'AllowContentAboveLock.exe',
            'asusblink.exe',
            'capsblink.exe',
            'YourPhoneHideBanner.exe',
            'DiscordRPC.exe',
            'NowPlayingTile-windows-x64.zip',
            'GenerateAssets.exe',
            'CharmTray.exe',
            'SecureDesktopLauncher-windows-x64.zip',
            'RealTimeNotesDeskband-windows-x64.zip'
          )

          $files = Get-ChildItem -LiteralPath artifacts -Recurse -File
          $assets = foreach ($name in $expected) {
            $match = $files | Where-Object { $_.Name -eq $name } | Select-Object -First 1
            if (-not $match) {
              throw "Release asset missing from downloaded artifact: $name"
            }
            $match.FullName
          }

          $checksumLines = @(
            '<!-- AIProjects checksums -->',
            '## SHA256 checksums',
            '',
            '| File | SHA256 |',
            '| --- | --- |'
          )
          foreach ($asset in $assets) {
            $name = Split-Path -Leaf $asset
            $hash = (Get-FileHash -LiteralPath $asset -Algorithm SHA256).Hash.ToLowerInvariant()
            $checksumLines += "| ``$name`` | ``$hash`` |"
          }
          $checksumBlock = $checksumLines -join "`n"

          $currentBody = gh release view $env:RELEASE_TAG --json body -q .body
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $pattern = '(?s)<!-- AIProjects checksums -->.*$'
          if ($currentBody -match $pattern) {
            $newBody = [regex]::Replace($currentBody, $pattern, $checksumBlock)
          } elseif ($currentBody.Trim()) {
            $newBody = $currentBody.TrimEnd() + "`n`n" + $checksumBlock
          } else {
            $newBody = "Automated Windows binaries built by GitHub Actions.`n`n" + $checksumBlock
          }

          gh release edit $env:RELEASE_TAG --notes $newBody
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          gh release upload $env:RELEASE_TAG @assets --clobber
